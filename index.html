<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a12">
<title>AKH 313 — Carte Cosmique des Traditions Sacrées</title>
<meta name="description" content="Visualisation 3D interactive des traditions sacrées à travers l'espace et le temps. 48 livres, 24 écoles de pensée — de Göbekli Tepe (9600 AEC) au présent.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&family=Outfit:wght@200;300;400;600;700&display=swap');

:root {
  --bg: #0a0a12;
  --bg-panel: rgba(12,12,22,0.92);
  --text: #e8e4dc;
  --text-dim: #9e9a8e;
  --accent: #d4a574;
  --accent2: #4ecdc4;
  --gold: #fbbf24;
  --border: rgba(212,165,116,0.15);
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Outfit', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
}

canvas { display: block; }

/* ─── LOADING ─── */
#loading {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.6s ease;
}
#loading.hidden { opacity: 0; pointer-events: none; }
#loading h1 {
  font-family: var(--font-display);
  font-size: 2.4rem; font-weight: 300;
  color: var(--accent);
  letter-spacing: 0.3em;
  margin-bottom: 0.5rem;
}
#loading p {
  font-size: 0.85rem; color: var(--text-dim);
  letter-spacing: 0.15em;
}
.loader-ring {
  width: 48px; height: 48px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-top: 2rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── HEADER ─── */
#header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.2rem 2rem;
  background: linear-gradient(180deg, rgba(10,10,18,0.95) 0%, transparent 100%);
  display: flex; align-items: center; justify-content: space-between;
  pointer-events: none;
}
#header > * { pointer-events: auto; }
#header h1 {
  font-family: var(--font-display);
  font-size: 1.3rem; font-weight: 300;
  color: var(--accent);
  letter-spacing: 0.25em;
}
#header h1 span { color: var(--text-dim); font-size: 0.75rem; letter-spacing: 0.1em; }

.view-toggle {
  display: flex; gap: 0.5rem;
}
.view-toggle button {
  background: var(--bg-panel); border: 1px solid var(--border);
  color: var(--text-dim); padding: 0.4rem 1rem;
  font-family: var(--font-body); font-size: 0.75rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; border-radius: 2px;
  transition: all 0.3s;
}
.view-toggle button.active,
.view-toggle button:hover {
  color: var(--accent); border-color: var(--accent);
}

/* ─── INFO PANEL ─── */
#info-panel {
  position: fixed; right: 1.5rem; top: 5rem;
  width: 340px; max-height: calc(100vh - 7rem);
  overflow-y: auto;
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1.5rem;
  z-index: 200;
  opacity: 0; transform: translateX(20px);
  transition: all 0.4s ease;
  pointer-events: none;
  backdrop-filter: blur(20px);
}
#info-panel.visible {
  opacity: 1; transform: translateX(0);
  pointer-events: auto;
}
#info-panel .close-btn {
  position: absolute; top: 0.8rem; right: 0.8rem;
  background: none; border: none; color: var(--text-dim);
  font-size: 1.2rem; cursor: pointer;
}
#info-panel h2 {
  font-family: var(--font-display);
  font-size: 1.4rem; font-weight: 400;
  color: var(--accent); margin-bottom: 0.3rem;
}
#info-panel .dates {
  font-family: var(--font-mono); font-size: 0.7rem;
  color: var(--accent2); margin-bottom: 0.8rem;
  letter-spacing: 0.05em;
}
#info-panel .type-badge {
  display: inline-block; font-size: 0.65rem;
  padding: 0.15rem 0.5rem; border-radius: 2px;
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 1rem;
}
#info-panel .desc {
  font-size: 0.85rem; line-height: 1.6;
  color: var(--text); margin-bottom: 1rem;
}
#info-panel .books-title {
  font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--text-dim);
  margin-bottom: 0.4rem;
}
#info-panel .book {
  font-size: 0.8rem; color: var(--gold);
  padding: 0.15rem 0;
  font-family: var(--font-display);
  font-style: italic;
}
#info-panel .connections-section {
  margin-top: 1rem; padding-top: 1rem;
  border-top: 1px solid var(--border);
}
#info-panel .conn-label {
  font-size: 0.7rem; text-transform: uppercase;
  letter-spacing: 0.15em; color: var(--text-dim);
  margin-bottom: 0.4rem;
}
#info-panel .conn-item {
  font-size: 0.8rem; color: var(--text);
  padding: 0.2rem 0;
  cursor: pointer;
}
#info-panel .conn-item:hover { color: var(--accent2); }
#info-panel .conn-arrow { color: var(--accent); }

/* ─── LEGEND ─── */
#legend {
  position: fixed; left: 1.5rem; bottom: 5.5rem;
  z-index: 100;
  display: flex; flex-direction: column; gap: 0.35rem;
}
#legend .item {
  display: flex; align-items: center; gap: 0.5rem;
  font-size: 0.7rem; color: var(--text-dim);
  letter-spacing: 0.05em;
}
#legend .dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* ─── TIME SLIDER ─── */
#time-controls {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: linear-gradient(0deg, rgba(10,10,18,0.95) 0%, transparent 100%);
  padding: 1rem 2rem 1.5rem;
}
#time-controls .time-display {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--accent);
  margin-bottom: 0.5rem;
  letter-spacing: 0.1em;
}
#time-slider {
  width: 100%; appearance: none;
  height: 3px; background: var(--border);
  outline: none; border-radius: 2px;
}
#time-slider::-webkit-slider-thumb {
  appearance: none; width: 14px; height: 14px;
  background: var(--accent); border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(212,165,116,0.5);
}
#time-slider::-moz-range-thumb {
  width: 14px; height: 14px;
  background: var(--accent); border-radius: 50%;
  cursor: pointer; border: none;
  box-shadow: 0 0 12px rgba(212,165,116,0.5);
}
.time-labels {
  display: flex; justify-content: space-between;
  font-size: 0.6rem; color: var(--text-dim);
  margin-top: 0.3rem;
  font-family: var(--font-mono);
}

/* ─── TIMELINE VIEW ─── */
#timeline-view {
  display: none;
  position: fixed; inset: 0;
  z-index: 50;
  background: var(--bg);
  overflow-y: auto;
  padding: 5rem 2rem 2rem;
}
#timeline-view.active { display: block; }

.tl-container {
  max-width: 900px; margin: 0 auto;
  position: relative;
  padding-left: 120px;
}
.tl-line {
  position: absolute; left: 100px; top: 0; bottom: 0;
  width: 2px; background: var(--border);
}
.tl-entry {
  position: relative; padding: 1rem 0 2rem 2rem;
  cursor: pointer;
  transition: all 0.3s;
}
.tl-entry:hover { transform: translateX(4px); }
.tl-entry .tl-date {
  position: absolute; left: -120px; top: 1rem;
  font-family: var(--font-mono); font-size: 0.7rem;
  color: var(--accent2); width: 100px; text-align: right;
}
.tl-entry .tl-dot {
  position: absolute; left: -6px; top: 1.3rem;
  width: 10px; height: 10px; border-radius: 50%;
  border: 2px solid var(--bg);
}
.tl-entry h3 {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 400;
  color: var(--text); margin-bottom: 0.2rem;
}
.tl-entry p {
  font-size: 0.8rem; color: var(--text-dim);
  line-height: 1.5;
}

/* ─── FOCUS STATES ─── */
.view-toggle button:focus-visible,
#time-slider:focus-visible,
.tl-entry:focus-visible,
#info-panel .conn-item:focus-visible,
.skip-link:focus-visible,
.close-btn:focus-visible,
.fallback-link:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 2px;
}
.view-toggle button:focus:not(:focus-visible),
#time-slider:focus:not(:focus-visible),
.tl-entry:focus:not(:focus-visible),
#info-panel .conn-item:focus:not(:focus-visible),
.skip-link:focus:not(:focus-visible),
.close-btn:focus:not(:focus-visible),
.fallback-link:focus:not(:focus-visible) {
  outline: none;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  #info-panel { right: 0.5rem; left: 0.5rem; width: auto; top: 4rem; }
  #header { padding: 0.8rem 1rem; }
  #header h1 { font-size: 1rem; }
  #legend { left: 0.8rem; bottom: 5rem; }
  .tl-container { padding-left: 80px; }
  .tl-line { left: 60px; }
  .tl-entry .tl-date { left: -80px; width: 60px; font-size: 0.6rem; }
}

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ─── FALLBACK ─── */
#fallback {
  display: none;
  position: fixed; inset: 0;
  z-index: 999;
  background: var(--bg);
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
#fallback.visible { display: flex; }
#fallback h2 {
  font-family: var(--font-display);
  font-size: 1.8rem; font-weight: 300;
  color: var(--accent);
  letter-spacing: 0.2em;
  margin-bottom: 1rem;
}
#fallback p {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.6;
  max-width: 480px;
  margin-bottom: 1.5rem;
}
#fallback .fallback-link {
  display: inline-block;
  font-family: var(--font-body);
  font-size: 0.85rem;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 0.6rem 1.5rem;
  text-decoration: none;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.3s;
}
#fallback .fallback-link:hover {
  background: var(--accent);
  color: var(--bg);
}

/* ─── SKIP LINK ─── */
.skip-link {
  position: absolute;
  top: -40px;
  left: 0;
  z-index: 9999;
  background: var(--accent);
  color: var(--bg);
  padding: 8px 16px;
  font-family: var(--font-body);
  font-size: 0.85rem;
  text-decoration: none;
  letter-spacing: 0.05em;
  transition: top 0.2s;
}
.skip-link:focus {
  top: 0;
}
</style>
</head>
<body>

<!-- SKIP LINK -->
<a href="#timeline-view" class="skip-link">Passer au contenu</a>

<!-- LOADING -->
<div id="loading">
  <h1>AKH 313</h1>
  <p>CARTE COSMIQUE DES TRADITIONS SACRÉES</p>
  <div class="loader-ring"></div>
</div>

<!-- HEADER -->
<nav id="header" aria-label="Navigation principale">
  <h1>AKH 313 <span>· ÉCOLE DE PENSÉE</span></h1>
  <div class="view-toggle">
    <button id="btn-3d" class="active" aria-label="Vue 3D">Disque 3D</button>
    <button id="btn-timeline" aria-label="Vue chronologique">Timeline</button>
  </div>
</nav>

<!-- INFO PANEL -->
<aside id="info-panel" aria-live="polite">
  <button class="close-btn" onclick="closePanel()" aria-label="Fermer le panneau">✕</button>
  <h2 id="panel-name"></h2>
  <div class="dates" id="panel-dates"></div>
  <div class="type-badge" id="panel-type"></div>
  <div class="desc" id="panel-desc"></div>
  <div id="panel-books"></div>
  <div class="connections-section" id="panel-connections"></div>
</aside>

<!-- LEGEND -->
<div id="legend" style="display:none;"></div>

<!-- TIME CONTROLS -->
<div id="time-controls">
  <div class="time-display" id="time-display">Toutes les époques</div>
  <input type="range" id="time-slider" min="-10000" max="2026" value="2026" step="50" aria-label="Curseur temporel — filtrer par époque">
  <div class="time-labels">
    <span>10 000 AEC</span>
    <span>5 000 AEC</span>
    <span>0</span>
    <span>1000 EC</span>
    <span>Présent</span>
  </div>
</div>

<!-- 3D CANVAS + TIMELINE -->
<main id="canvas-container" role="application" aria-label="Carte cosmique 3D des traditions sacrées">
<div id="timeline-view"></div>
</main>

<!-- FALLBACK -->
<div id="fallback">
  <h2>AKH 313</h2>
  <p id="fallback-msg"></p>
  <a class="fallback-link" id="fallback-link">Voir la Timeline</a>
</div>

<!-- THREE.JS -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import { CIVILIZATIONS, CONNECTIONS, TYPES, REGIONS } from './js/data.js';

// ============================================================
// UTILITIES (available to both 3D and Timeline fallback)
// ============================================================
function formatYear(y) {
  if (y < 0) return Math.abs(y) + ' AEC';
  if (y === 2026) return 'Présent';
  return y + ' EC';
}

function buildTimeline() {
  const sorted = [...CIVILIZATIONS].sort((a, b) => a.startYear - b.startYear);
  const el = document.getElementById('timeline-view');
  let html = '<div class="tl-container"><div class="tl-line"></div>';
  sorted.forEach(civ => {
    const typeInfo = TYPES[civ.type];
    const color = '#' + typeInfo.color.toString(16).padStart(6, '0');
    html += `
      <div class="tl-entry" tabindex="0" onclick="window._selectCiv('${civ.id}'); document.getElementById('btn-3d').click();">
        <div class="tl-date">${formatYear(civ.startYear)}</div>
        <div class="tl-dot" style="background:${color}"></div>
        <h3>${civ.name}</h3>
        <p>${civ.description.substring(0, 150)}${civ.description.length > 150 ? '…' : ''}</p>
      </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// ============================================================
// FALLBACK HANDLING
// ============================================================
function showFallback(message) {
  document.getElementById('fallback-msg').textContent = message;
  document.getElementById('fallback').classList.add('visible');
  document.getElementById('loading').classList.add('hidden');
  setTimeout(() => { const ld = document.getElementById('loading'); if (ld) ld.remove(); }, 600);
}

function activateTimeline() {
  buildTimeline();
  document.getElementById('btn-timeline').classList.add('active');
  document.getElementById('btn-3d').classList.remove('active');
  document.getElementById('btn-3d').disabled = true;
  document.getElementById('btn-3d').style.opacity = '0.3';
  document.getElementById('btn-3d').style.cursor = 'not-allowed';
  document.getElementById('timeline-view').classList.add('active');
  document.getElementById('time-controls').style.display = 'none';
  document.getElementById('legend').style.display = 'none';
  document.getElementById('fallback-link').addEventListener('click', () => {
    document.getElementById('fallback').classList.remove('visible');
  });
}

// ============================================================
// WEBGL DETECTION
// ============================================================
function detectWebGL() {
  try {
    const canvas = document.createElement('canvas');
    return !!(canvas.getContext('webgl') || canvas.getContext('experimental-webgl'));
  } catch (e) {
    return false;
  }
}

window.closePanel = function() {};
window._selectCiv = function() {};

// ============================================================
// KEYBOARD NAVIGATION
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') window.closePanel();
});

document.getElementById('timeline-view').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    const entry = e.target.closest('.tl-entry');
    if (entry) { e.preventDefault(); entry.click(); }
  }
});

document.getElementById('info-panel').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    const item = e.target.closest('.conn-item');
    if (item) { e.preventDefault(); item.click(); }
  }
});

const hasWebGL = detectWebGL();

if (!hasWebGL) {
  activateTimeline();
  showFallback('Votre navigateur ne supporte pas WebGL. Veuillez utiliser Chrome, Firefox ou Safari récent.');
} else {
try {
const THREE = await import('three');
const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');

// ============================================================
// SCENE SETUP
// ============================================================
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a12, 0.012);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 35, 45);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a12);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 10;
controls.maxDistance = 80;
controls.maxPolarAngle = Math.PI / 2.1;
controls.target.set(0, 0, 0);

// ============================================================
// LIGHTING
// ============================================================
const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xd4a574, 1.2, 80);
pointLight.position.set(0, 15, 0);
scene.add(pointLight);

const rimLight = new THREE.DirectionalLight(0x4ecdc4, 0.3);
rimLight.position.set(-20, 10, 20);
scene.add(rimLight);

// ============================================================
// COSMIC DISC
// ============================================================
// Main disc
const discGeometry = new THREE.CylinderGeometry(30, 30, 0.15, 128);
const discMaterial = new THREE.MeshPhongMaterial({
  color: 0x0e0e1a,
  emissive: 0x050510,
  transparent: true,
  opacity: 0.85,
  shininess: 30,
});
const disc = new THREE.Mesh(discGeometry, discMaterial);
disc.position.y = -0.5;
scene.add(disc);

// Ring markers for time periods
const ringMaterial = new THREE.MeshBasicMaterial({ color: 0xd4a574, transparent: true, opacity: 0.08 });
[5, 10, 15, 20, 25, 30].forEach(r => {
  const ring = new THREE.Mesh(new THREE.RingGeometry(r - 0.02, r + 0.02, 128), ringMaterial);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = -0.4;
  scene.add(ring);
});

// Region divider lines
const regionLineMat = new THREE.LineBasicMaterial({ color: 0xd4a574, transparent: true, opacity: 0.06 });
Object.values(REGIONS).forEach(reg => {
  const angle = (reg.angle * Math.PI) / 180;
  const points = [new THREE.Vector3(0, -0.3, 0), new THREE.Vector3(Math.cos(angle) * 30, -0.3, Math.sin(angle) * 30)];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  scene.add(new THREE.Line(geo, regionLineMat));
});

// ============================================================
// STARFIELD
// ============================================================
const starCount = 3000;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 60 + Math.random() * 80;
  starPos[i*3]     = r * Math.sin(phi) * Math.cos(theta);
  starPos[i*3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starPos[i*3 + 2] = r * Math.cos(phi);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.6 });
scene.add(new THREE.Points(starGeo, starMat));

// ============================================================
// HELPER: year → radial position
// ============================================================
const MIN_YEAR = -10000;
const MAX_YEAR = 2026;

function yearToRadius(year) {
  // Center = oldest, outer = present
  const t = (year - MIN_YEAR) / (MAX_YEAR - MIN_YEAR);
  return 2 + t * 26; // 2..28
}

function civToPosition(civ) {
  const midYear = (civ.startYear + civ.endYear) / 2;
  const r = yearToRadius(midYear);
  const region = REGIONS[civ.region];
  // Add some variation within the region span
  const hash = civ.id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
  const angleOffset = (hash % 100) / 100 * region.span;
  const angle = ((region.angle + angleOffset) * Math.PI) / 180;
  return {
    x: Math.cos(angle) * r,
    y: 0,
    z: Math.sin(angle) * r,
    radius: r,
    angle: angle,
  };
}

// ============================================================
// MARKERS (civilization spheres)
// ============================================================
const markers = [];
const markerGroup = new THREE.Group();

CIVILIZATIONS.forEach(civ => {
  const typeInfo = TYPES[civ.type];
  const pos = civToPosition(civ);

  // Sphere marker
  const size = civ.id === 'akh313' ? 0.8 : 0.4;
  const geo = new THREE.SphereGeometry(size, 16, 16);
  const mat = new THREE.MeshPhongMaterial({
    color: typeInfo.color,
    emissive: typeInfo.color,
    emissiveIntensity: typeInfo.glow,
    transparent: true,
    opacity: 0.9,
  });
  const sphere = new THREE.Mesh(geo, mat);
  sphere.position.set(pos.x, 0.3, pos.z);
  sphere.userData = { civ, typeInfo, baseY: 0.3 };
  markerGroup.add(sphere);

  // Pillar (vertical line from disc to marker)
  const pillarGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(pos.x, -0.4, pos.z),
    new THREE.Vector3(pos.x, 0.3, pos.z),
  ]);
  const pillarMat = new THREE.LineBasicMaterial({ color: typeInfo.color, transparent: true, opacity: 0.3 });
  markerGroup.add(new THREE.Line(pillarGeo, pillarMat));

  markers.push({ sphere, civ, pos });
});

scene.add(markerGroup);

// ============================================================
// CONNECTIONS (curved lines between traditions)
// ============================================================
const connectionGroup = new THREE.Group();

CONNECTIONS.forEach(conn => {
  const fromCiv = CIVILIZATIONS.find(c => c.id === conn.from);
  const toCiv = CIVILIZATIONS.find(c => c.id === conn.to);
  if (!fromCiv || !toCiv) return;

  const fromPos = civToPosition(fromCiv);
  const toPos = civToPosition(toCiv);

  // Quadratic bezier curve with a lifted midpoint
  const mid = new THREE.Vector3(
    (fromPos.x + toPos.x) / 2,
    2 + Math.random() * 2,
    (fromPos.z + toPos.z) / 2,
  );

  const curve = new THREE.QuadraticBezierCurve3(
    new THREE.Vector3(fromPos.x, 0.3, fromPos.z),
    mid,
    new THREE.Vector3(toPos.x, 0.3, toPos.z),
  );

  const points = curve.getPoints(32);
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({
    color: TYPES[fromCiv.type].color,
    transparent: true,
    opacity: 0.12,
  });
  const line = new THREE.Line(geo, mat);
  line.userData = { conn, fromCiv, toCiv };
  connectionGroup.add(line);
});

scene.add(connectionGroup);

// ============================================================
// RAYCASTER (click interaction)
// ============================================================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedMarker = null;

function onPointerDown(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const spheres = markers.map(m => m.sphere);
  const intersects = raycaster.intersectObjects(spheres);

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    showPanel(hit.userData.civ);
    highlightMarker(hit);
  }
}
renderer.domElement.addEventListener('pointerdown', onPointerDown);

function highlightMarker(sphere) {
  // Reset previous
  if (selectedMarker) {
    selectedMarker.scale.set(1, 1, 1);
  }
  selectedMarker = sphere;
  sphere.scale.set(1.6, 1.6, 1.6);

  // Highlight connections
  connectionGroup.children.forEach(line => {
    const conn = line.userData.conn;
    if (conn && (conn.from === sphere.userData.civ.id || conn.to === sphere.userData.civ.id)) {
      line.material.opacity = 0.6;
    } else if (conn) {
      line.material.opacity = 0.05;
    }
  });
}

function resetHighlights() {
  if (selectedMarker) selectedMarker.scale.set(1, 1, 1);
  selectedMarker = null;
  connectionGroup.children.forEach(line => {
    if (line.material) line.material.opacity = 0.12;
  });
}

// ============================================================
// INFO PANEL
// ============================================================
const panel = document.getElementById('info-panel');

function showPanel(civ) {
  const typeInfo = TYPES[civ.type];
  document.getElementById('panel-name').textContent = civ.name;
  document.getElementById('panel-dates').textContent = formatYear(civ.startYear) + ' → ' + formatYear(civ.endYear);

  const badge = document.getElementById('panel-type');
  badge.textContent = typeInfo.label;
  badge.style.background = '#' + typeInfo.color.toString(16).padStart(6, '0') + '22';
  badge.style.color = '#' + typeInfo.color.toString(16).padStart(6, '0');

  document.getElementById('panel-desc').textContent = civ.description;

  // Books
  const booksDiv = document.getElementById('panel-books');
  if (civ.books && civ.books.length > 0) {
    booksDiv.innerHTML = '<div class="books-title">Livres du curriculum</div>' +
      civ.books.map(b => `<div class="book">📖 ${b}</div>`).join('');
  } else {
    booksDiv.innerHTML = '';
  }

  // Connections
  const connDiv = document.getElementById('panel-connections');
  const relatedConns = CONNECTIONS.filter(c => c.from === civ.id || c.to === civ.id);
  if (relatedConns.length > 0) {
    connDiv.innerHTML = '<div class="conn-label">Connexions</div>' +
      relatedConns.map(c => {
        const other = c.from === civ.id ? c.to : c.from;
        const otherCiv = CIVILIZATIONS.find(cv => cv.id === other);
        const direction = c.from === civ.id ? '→' : '←';
        return `<div class="conn-item" tabindex="0" onclick="window._selectCiv('${other}')">`
          + `<span class="conn-arrow">${direction}</span> ${otherCiv ? otherCiv.name : other} — <em>${c.label}</em></div>`;
      }).join('');
  } else {
    connDiv.innerHTML = '';
  }

  panel.classList.add('visible');
}

window.closePanel = function() {
  panel.classList.remove('visible');
  resetHighlights();
};

window._selectCiv = function(id) {
  const m = markers.find(m => m.civ.id === id);
  if (m) {
    showPanel(m.civ);
    highlightMarker(m.sphere);
  }
};

// ============================================================
// TIME SLIDER
// ============================================================
const timeSlider = document.getElementById('time-slider');
const timeDisplay = document.getElementById('time-display');

timeSlider.addEventListener('input', () => {
  const year = parseInt(timeSlider.value);
  timeDisplay.textContent = year >= 2026 ? 'Toutes les époques' : formatYear(year);

  markers.forEach(({ sphere, civ }) => {
    if (year >= 2026) {
      sphere.visible = true;
      sphere.material.opacity = 0.9;
    } else {
      const visible = civ.startYear <= year && civ.endYear >= year;
      sphere.visible = visible;
      if (visible) {
        const proximity = 1 - Math.abs(year - (civ.startYear + civ.endYear)/2) / ((civ.endYear - civ.startYear)/2 + 500);
        sphere.material.opacity = Math.max(0.3, proximity);
      }
    }
  });
});

// ============================================================
// LEGEND
// ============================================================
const legendEl = document.getElementById('legend');
Object.entries(TYPES).forEach(([key, type]) => {
  const color = '#' + type.color.toString(16).padStart(6, '0');
  legendEl.innerHTML += `<div class="item"><div class="dot" style="background:${color}"></div>${type.label}</div>`;
});

// ============================================================
// VIEW TOGGLE
// ============================================================
const btn3d = document.getElementById('btn-3d');
const btnTimeline = document.getElementById('btn-timeline');
const timelineView = document.getElementById('timeline-view');

btn3d.addEventListener('click', () => {
  btn3d.classList.add('active');
  btnTimeline.classList.remove('active');
  timelineView.classList.remove('active');
  renderer.domElement.style.display = '';
  document.getElementById('time-controls').style.display = '';
  document.getElementById('legend').style.display = '';
});

btnTimeline.addEventListener('click', () => {
  btnTimeline.classList.add('active');
  btn3d.classList.remove('active');
  timelineView.classList.add('active');
  renderer.domElement.style.display = 'none';
  document.getElementById('time-controls').style.display = 'none';
  document.getElementById('legend').style.display = 'none';
});

buildTimeline();

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  controls.update();

  const t = clock.getElapsedTime();

  // Gentle rotation of connection lines
  connectionGroup.rotation.y = Math.sin(t * 0.05) * 0.02;

  // Pulsing central light
  pointLight.intensity = 1.2 + Math.sin(t * 0.8) * 0.3;

  // Animate marker glow
  markers.forEach(({ sphere }, i) => {
    if (sphere.visible) {
      sphere.material.emissiveIntensity = sphere.userData.typeInfo.glow * (0.8 + Math.sin(t * 1.5 + i * 0.3) * 0.2);
    }
  });

  renderer.render(scene, camera);
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// INIT
// ============================================================
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('legend').style.display = '';
  setTimeout(() => document.getElementById('loading').remove(), 600);
}, 1200);

animate();

} catch (e) {
  activateTimeline();
  showFallback('Erreur de chargement 3D. Basculez sur la vue Timeline.');
}
}
</script>
</body>
</html>
